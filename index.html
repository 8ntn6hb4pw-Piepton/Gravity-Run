    function drawPlayer(player) {
      if (player.hidden) {
        return;
      }

      if (player.invulnerable > 0 && Math.floor(player.invulnerable * 12) % 2 === 0) {
        return;
      }

      ctx.save();
      ctx.translate(player.x, player.y);

      const skinColors = {
        classic: "#7b3f22",
        mint: "#5c8f77",
        berry: "#8a4768",
        gold: "#b6892d"
      };
      ctx.fillStyle = skinColors[player.skin] || skinColors.classic;
      roundRect(0, 0, player.w, player.h, player.crouching ? 8 : 10);
      ctx.fill();

      ctx.fillStyle = "#5a2d19";
      const tileRows = player.crouching ? 2 : 3;
      const tileHeight = player.crouching ? 10 : 11;
      for (let row = 0; row < tileRows; row++) {
        for (let col = 0; col < 2; col++) {
          ctx.fillRect(6 + col * 16, 6 + row * (player.crouching ? 12 : 15), 12, tileHeight);
        }
      }

      ctx.strokeStyle = "#ffecd7";
      ctx.lineWidth = 3;
      const stride = Math.min(1, Math.abs(player.vx) / 220);
      const armSwing = Math.sin(state.elapsed * (7 + stride * 7) + player.x * 0.03) * (5 + stride * 8) + player.vy * 0.008;
      const legSwing = Math.sin(state.elapsed * (7 + stride * 7) + player.x * 0.03 + 1.3) * (6 + stride * 10) - player.vy * 0.01;

      ctx.beginPath();
      const armY = player.crouching ? 14 : 20;
      ctx.moveTo(8, armY);
      ctx.lineTo(-10, armY + 6 + armSwing * (player.crouching ? 0.45 : 1));
      ctx.moveTo(player.w - 8, armY);
      ctx.lineTo(player.w + 10, armY + 6 - armSwing * (player.crouching ? 0.45 : 1));
      ctx.moveTo(12, player.h);
      ctx.lineTo(8, player.h + (player.crouching ? 10 : 18) + legSwing * (player.crouching ? 0.35 : 1));
      ctx.moveTo(player.w - 12, player.h);
      ctx.lineTo(player.w - 8, player.h + (player.crouching ? 10 : 18) - legSwing * (player.crouching ? 0.35 : 1));
      ctx.stroke();

      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      const eyeY = player.crouching ? 13 : 17;
      ctx.arc(14, eyeY, 4, 0, Math.PI * 2);
      ctx.arc(player.w - 14, eyeY, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#2b1a12";
      ctx.beginPath();
      ctx.arc(14 + player.facing * 1.2, eyeY, 2, 0, Math.PI * 2);
      ctx.arc(player.w - 14 + player.facing * 1.2, eyeY, 2, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#f7d9c0";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(player.w / 2, player.crouching ? 22 : 30, player.crouching ? 5 : 7, 0.2, Math.PI - 0.2);
      ctx.stroke();

      if (player.rocketPackTimer > 0) {
        ctx.fillStyle = "#8a98a8";
        ctx.fillRect(-8, 16, 8, 18);
        ctx.fillRect(player.w, 16, 8, 18);
        ctx.fillStyle = "#ff9b54";
        ctx.beginPath();
        ctx.moveTo(-4, 34);
        ctx.lineTo(-10, 46 + Math.sin(state.elapsed * 15) * 4);
        ctx.lineTo(0, 34);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(player.w + 4, 34);
        ctx.lineTo(player.w + 10, 46 + Math.sin(state.elapsed * 15) * 4);
        ctx.lineTo(player.w, 34);
        ctx.closePath();
        ctx.fill();
      }

      if (player.shieldHits > 0) {
        ctx.strokeStyle = "rgba(127, 215, 255, 0.7)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(player.w / 2, player.h / 2, player.w / 2 + 8, player.h / 2 + 8, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawWrappedText(text, x, y, maxWidth, lineHeight, maxLines = 2) {
      const words = text.split(" ");
      let line = "";
      let lineIndex = 0;

      for (const word of words) {
        const testLine = line ? `${line} ${word}` : word;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          ctx.fillText(line, x, y + lineIndex * lineHeight);
          line = word;
          lineIndex += 1;
          if (lineIndex >= maxLines - 1) {
            break;
          }
        } else {
          line = testLine;
        }
      }

      if (lineIndex < maxLines) {
        ctx.fillText(line, x, y + lineIndex * lineHeight);
      }
    }

    function getPredictedLandingPoint() {
      const level = getLevel();
      const player = state.player;
      if (!state.started || !player || state.gameWon || state.rescue || state.transition || player.onGround) {
        return null;
      }

      let simX = player.x;
      let simY = player.y;
      let simVx = player.vx;
      let simVy = player.vy;
      const dt = 1 / 60;
      const maxSteps = 240;
      const solids = getSolids(level);

      for (let step = 0; step < maxSteps; step++) {
        simVy += level.jumpMetrics.gravity * dt;
        simX += simVx * dt;
        simY += simVy * dt;

        const box = { x: simX, y: simY, w: player.w, h: player.h };
        for (const solid of solids) {
          if (overlaps(box, solid) && simVy >= 0) {
            return {
              x: simX + player.w / 2,
              y: solid.y - 4
            };
          }
        }

        if (simY > canvas.height + 120) {
          return {
            x: clamp(simX + player.w / 2, 18, WORLD_WIDTH - 18),
            y: canvas.height - 18
          };
        }
      }

      return null;
    }

    function drawOffscreenHint() {
      const player = state.player;
      if (!player || player.y > -8) {
        return;
      }

      const point = getPredictedLandingPoint();
      if (!point) {
        return;
      }

      const screenX = point.x - state.cameraX;
      const screenY = point.y;
      if (screenX < -20 || screenX > canvas.width + 20) {
        return;
      }

      ctx.save();
      ctx.fillStyle = "rgba(255, 92, 92, 0.82)";
      ctx.beginPath();
      ctx.arc(screenX, screenY, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(255, 220, 220, 0.55)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(screenX, screenY, 6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function formatTime(seconds) {
      const total = Math.max(0, Math.round(seconds * 10) / 10);
      const minutes = Math.floor(total / 60);
      const rest = (total - minutes * 60).toFixed(1).padStart(4, "0");
      return `${minutes}:${rest}`;
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function hexToRgba(hex, alpha) {
      const value = hex.replace("#", "");
      const bigint = parseInt(value, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function lighten(hex, amount) {
      const value = hex.replace("#", "");
      const bigint = parseInt(value, 16);
      let r = (bigint >> 16) & 255;
      let g = (bigint >> 8) & 255;
      let b = bigint & 255;
      r = Math.round(r + (255 - r) * amount);
      g = Math.round(g + (255 - g) * amount);
      b = Math.round(b + (255 - b) * amount);
      return `rgb(${r}, ${g}, ${b})`;
    }

    document.addEventListener("keydown", event => {
      if (!state.started && (event.code === "Space" || event.code === "Enter")) {
        event.preventDefault();
        ensureAudio();
        state.started = true;
        state.totalRunTime = 0;
        state.message = `<strong>"Hallo aus ${getLevel().display}!"</strong> Hier gilt ${getDisplayGravity(getLevel())}. Ich habe immer noch 100 g Masse.<br>${getLevelIntro(getLevel())}`;
        playSound("start");
        syncUi();
        return;
      }

      if (event.code === "ArrowLeft" || event.code === "KeyA") {
        keys.left = true;
      }
      if (event.code === "ArrowRight" || event.code === "KeyD") {
        keys.right = true;
      }
      if (event.code === "ArrowDown" || event.code === "KeyS") {
        keys.down = true;
      }
      if (event.code === "Space" || event.code === "KeyW") {
        event.preventDefault();
        keys.jumpHeld = true;
        state.player.jumpBuffer = JUMP_BUFFER_TIME * getCurrentDifficulty().jumpBuffer;
        shoveEnemies();
        jump();
      }
      if (event.code === "KeyR") {
        if (!state.started) {
          ensureAudio();
          state.started = true;
          playSound("start");
        }
        if (state.gameWon || state.levelIndex === 0) {
          state.totalRunTime = 0;
        }
        resetLevel(state.gameWon ? 0 : state.levelIndex);
      }
    });

    document.addEventListener("keyup", event => {
      if (event.code === "ArrowLeft" || event.code === "KeyA") {
        keys.left = false;
      }
      if (event.code === "ArrowRight" || event.code === "KeyD") {
        keys.right = false;
      }
      if (event.code === "ArrowDown" || event.code === "KeyS") {
        keys.down = false;
      }
      if (event.code === "Space" || event.code === "KeyW") {
        keys.jumpHeld = false;
        if (state.player) {
          state.player.jumpBoostTimer = 0;
        }
      }
    });

    function bindHoldButton(element, onStart, onEnd = onStart) {
      if (!element) {
        return;
      }
      const start = event => {
        event.preventDefault();
        ensureAudio();
        onStart(true);
      };
      const end = event => {
        event.preventDefault();
        onEnd(false);
      };
      element.addEventListener("touchstart", start, { passive: false });
      element.addEventListener("touchend", end, { passive: false });
      element.addEventListener("touchcancel", end, { passive: false });
      element.addEventListener("mousedown", start);
      element.addEventListener("mouseup", end);
      element.addEventListener("mouseleave", end);
    }

    function triggerTouchJump(pressed) {
      keys.jumpHeld = pressed;
      if (pressed) {
        if (!state.started) {
          state.started = true;
          state.totalRunTime = 0;
          state.message = `<strong>"Hallo aus ${getLevel().display}!"</strong> Hier gilt ${getDisplayGravity(getLevel())}. Ich habe immer noch 100 g Masse.<br>${getLevelIntro(getLevel())}`;
          playSound("start");
        }
        state.player.jumpBuffer = JUMP_BUFFER_TIME * getCurrentDifficulty().jumpBuffer;
        shoveEnemies();
        jump();
      } else if (state.player) {
        state.player.jumpBoostTimer = 0;
      }
    }

    function setupTouchControls() {
      bindHoldButton(ui.touchLeft, pressed => { keys.left = pressed; });
      bindHoldButton(ui.touchRight, pressed => { keys.right = pressed; });
      bindHoldButton(ui.touchDown, pressed => { keys.down = pressed; });
      bindHoldButton(ui.touchUp, pressed => { keys.jumpHeld = pressed; });
      bindHoldButton(ui.touchJump, triggerTouchJump, pressed => { keys.jumpHeld = pressed; });
      bindHoldButton(ui.touchAction, pressed => {
        if (pressed) {
          shoveEnemies();
        }
      }, () => {});
    }

    let lastTime = performance.now();
    function loop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.033);
      lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    resetLevel(0);
    setupTouchControls();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
