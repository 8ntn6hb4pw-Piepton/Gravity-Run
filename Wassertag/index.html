          roundRect(-13, slotY + 1, 6, 2, 1);
          ctx.fill();
        }
      }

      const red = Math.round(116 - poisonRatio * 24);
      const green = Math.round(220 - poisonRatio * 88);
      const blue = Math.round(255 - poisonRatio * 94);
      ctx.fillStyle = `rgba(${red}, ${green}, ${blue}, ${shimmer})`;
      ctx.beginPath();
      ctx.moveTo(centerX, 0);
      ctx.bezierCurveTo(leftX + bodyWidth + 10, 18, leftX + bodyWidth + 2, player.h - 6, centerX, player.h * (0.9 + waterRatio * 0.1));
      ctx.bezierCurveTo(leftX - 2, player.h - 6, leftX - 10, 18, centerX, 0);
      ctx.fill();

      ctx.fillStyle = `rgba(${223 - poisonRatio * 40}, ${252 - poisonRatio * 70}, ${255 - poisonRatio * 80}, 0.72)`;
      ctx.beginPath();
      ctx.ellipse(centerX - 6, 18, 7 + waterRatio * 2, 10 + waterRatio * 3, -0.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(14, player.crouching ? 18 : 20, 4, 0, Math.PI * 2);
      ctx.arc(player.w - 14, player.crouching ? 18 : 20, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#14394d";
      ctx.beginPath();
      ctx.arc(14 + player.facing * 1.2, player.crouching ? 18 : 20, 2, 0, Math.PI * 2);
      ctx.arc(player.w - 14 + player.facing * 1.2, player.crouching ? 18 : 20, 2, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#d6fbff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(player.w / 2, player.crouching ? 30 : 34, 6, 0.2, Math.PI - 0.2);
      ctx.stroke();

      if (player.contaminationTimer > 0) {
        ctx.strokeStyle = `rgba(94, ${90 + poisonRatio * 55}, 48, 0.92)`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(10, 28);
        ctx.lineTo(18, 36);
        ctx.lineTo(28, 26);
        ctx.lineTo(34, 34);
        ctx.stroke();

        ctx.fillStyle = `rgba(114, ${130 + poisonRatio * 60}, 74, ${0.18 + poisonRatio * 0.22})`;
        ctx.beginPath();
        ctx.ellipse(centerX + 2, 26, 12, 18, -0.2, 0, Math.PI * 2);
        ctx.fill();
      }

      if (player.attachedEnemy) {
        ctx.strokeStyle = "rgba(255, 232, 186, 0.8)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(player.w / 2, 10, player.w / 2 + 6, Math.PI, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawParticles() {
      for (const particle of state.particles) {
        const alpha = particle.life / particle.maxLife;
        ctx.fillStyle = hexToRgba(particle.color, alpha);
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawRescue() {
      const rescue = state.rescue;
      if (!rescue) {
        return;
      }

      ctx.save();
      ctx.translate(rescue.x, 0);

      if (rescue.phase === "fall") {
        ctx.globalAlpha = rescue.fade;
        ctx.fillStyle = "rgba(180, 236, 255, 0.75)";
        ctx.beginPath();
        ctx.moveTo(rescue.ghostX - rescue.x + 20, rescue.ghostY);
        ctx.bezierCurveTo(rescue.ghostX - rescue.x + 32, rescue.ghostY + 12, rescue.ghostX - rescue.x + 28, rescue.ghostY + 28, rescue.ghostX - rescue.x + 20, rescue.ghostY + 36);
        ctx.bezierCurveTo(rescue.ghostX - rescue.x + 12, rescue.ghostY + 28, rescue.ghostX - rescue.x + 8, rescue.ghostY + 12, rescue.ghostX - rescue.x + 20, rescue.ghostY);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      ctx.fillStyle = "#6fbf73";
      roundRect(-14, -6, 28, rescue.y + 20, 8);
      ctx.fill();
      ctx.fillStyle = "#8bd48f";
      roundRect(-20, rescue.y, 40, 20, 8);
      ctx.fill();
      ctx.fillStyle = "#4f9e57";
      ctx.fillRect(4, rescue.y + 16, 18, 8);

      ctx.fillStyle = "#c7f4ff";
      ctx.beginPath();
      ctx.moveTo(12, rescue.y + 24);
      ctx.bezierCurveTo(19, rescue.y + 36, 19, rescue.y + 48, 12, rescue.y + 56);
      ctx.bezierCurveTo(5, rescue.y + 48, 5, rescue.y + 36, 12, rescue.y + 24);
      ctx.fill();

      if (rescue.timer > 0.7) {
        const dripSwing = Math.sin(rescue.timer * 10) * 1.4;
        ctx.fillStyle = "rgba(222,252,255,0.82)";
        ctx.beginPath();
        ctx.moveTo(12, rescue.y + 24 + dripSwing);
        ctx.bezierCurveTo(20, rescue.y + 44 + dripSwing, 18, rescue.y + 62 + dripSwing, 12, rescue.y + 76 + dripSwing);
        ctx.bezierCurveTo(6, rescue.y + 62 + dripSwing, 4, rescue.y + 44 + dripSwing, 12, rescue.y + 24 + dripSwing);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawIntroCard(level) {
      ctx.save();
      ctx.fillStyle = "rgba(9, 14, 25, 0.84)";
      roundRect(18, 18, canvas.width - 36, 96, 18);
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1.5;
      roundRect(18, 18, canvas.width - 36, 96, 18);
      ctx.stroke();

      ctx.font = "bold 20px Trebuchet MS";
      ctx.fillText(level.display, 34, 48);

    function drawWorldEventOverlay() {
      if (!state.worldEvent || !state.worldEvent.active) {
        return;
      }

      ctx.save();
      if (state.worldEvent.type === "heat") {
        ctx.fillStyle = "rgba(255, 184, 84, 0.12)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < 6; i++) {
          ctx.strokeStyle = `rgba(255, 231, 180, ${0.1 + i * 0.03})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          for (let x = 0; x <= canvas.width; x += 24) {
            const y = 110 + i * 55 + Math.sin((x + state.levelElapsed * 150) * 0.02 + i) * 8;
            if (x === 0) {
              ctx.moveTo(x, y);
            } else {
              ctx.lineTo(x, y);
            }
          }
          ctx.stroke();
        }
      } else {
        ctx.fillStyle = "rgba(101, 78, 54, 0.08)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < 26; i++) {
          const x = (i * 42 + state.levelElapsed * 120) % (canvas.width + 60) - 30;
          const y = 120 + (i * 19) % 280;
          ctx.fillStyle = "rgba(132, 110, 86, 0.18)";
          ctx.fillRect(x, y, 18, 3);
        }
      }
      ctx.restore();
    }

    function drawWinOverlay() {
      const summary = state.levelSummary;
      ctx.fillStyle = "rgba(4, 8, 15, 0.62)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#fff2d9";
      ctx.textAlign = "center";
      ctx.font = "bold 36px Trebuchet MS";
      ctx.fillText("Der Tropfen lebt noch!", canvas.width / 2, 190);
      ctx.font = "20px Trebuchet MS";
      ctx.fillText("Alle Wuestenabschnitte wurden ueberlebt und jede Flaschenrakete ist gestartet.", canvas.width / 2, 235);
      if (summary) {
        ctx.fillText(`Letzte Zeit: ${formatTime(summary.time)}`, canvas.width / 2, 270);
        ctx.fillText(`Letzter Score: ${summary.score}`, canvas.width / 2, 305);
      }
      ctx.fillText("Druecke R fuer einen neuen Durchlauf.", canvas.width / 2, 360);
      ctx.textAlign = "left";
    }

    function calculateScore(levelTime = state.levelElapsed, level = getLevel()) {
      const player = state.player || createPlayer();
      const timeBonus = Math.max(0, 4000 - Math.round(levelTime * 55));
      const waterBonus = Math.round(player.water * 16);
      const flowersBonus = countPlantedFlowers() * 180;
      const sunflowerBonus = countHappySunflowers(level) * 120;
      return timeBonus + waterBonus + flowersBonus + sunflowerBonus;
    }

    function countPlantedFlowers() {
      return state.bloomPatches.filter(patch => patch.kind === "sprout" && (patch.growth || 0) > 0.95).length;
    }

    function countHappySunflowers(level) {
      const platforms = level.platforms.filter(platform => platform.h >= 40).slice(0, 6);
      return platforms.reduce((sum, platform, index) => {
        const baseX = platform.x + 54 + (index % 2) * 28;
        return sum + (isSunflowerHappy(baseX) ? 1 : 0);
      }, 0);
    }

    function drawWrappedText(text, x, y, maxWidth, lineHeight, maxLines = 2) {
      const words = text.split(" ");
      let line = "";
      let lineIndex = 0;
      for (const word of words) {
        const testLine = line ? `${line} ${word}` : word;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          ctx.fillText(line, x, y + lineIndex * lineHeight);
          line = word;
          lineIndex += 1;
          if (lineIndex >= maxLines - 1) {
            break;
          }
        } else {
          line = testLine;
        }
      }
      if (lineIndex < maxLines) {
        ctx.fillText(line, x, y + lineIndex * lineHeight);
      }
    }

    function formatTime(seconds) {
      const total = Math.max(0, Math.round(seconds * 10) / 10);
      const minutes = Math.floor(total / 60);
      const rest = (total - minutes * 60).toFixed(1).padStart(4, "0");
      return `${minutes}:${rest}`;
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function hexToRgba(hex, alpha) {
      const value = hex.replace("#", "");
      const bigint = parseInt(value, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function lighten(hex, amount) {
      const value = hex.replace("#", "");
      const bigint = parseInt(value, 16);
      let r = (bigint >> 16) & 255;
      let g = (bigint >> 8) & 255;
      let b = bigint & 255;
      r = Math.round(r + (255 - r) * amount);
      g = Math.round(g + (255 - g) * amount);
      b = Math.round(b + (255 - b) * amount);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function overlaps(a, b) {
      return a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function moveTowards(current, target, maxDelta) {
      if (current < target) {
        return Math.min(current + maxDelta, target);
      }
      if (current > target) {
        return Math.max(current - maxDelta, target);
      }
      return current;
    }

    document.addEventListener("keydown", event => {
      if (!state.started && (event.code === "Space" || event.code === "Enter")) {
        event.preventDefault();
        startGame();
        return;
      }

      if (event.code === "ArrowLeft" || event.code === "KeyA") {
        keys.left = true;
      }
      if (event.code === "ArrowRight" || event.code === "KeyD") {
        keys.right = true;
      }
      if (event.code === "ArrowDown" || event.code === "KeyS") {
        keys.down = true;
      }
      if (event.code === "Space" || event.code === "KeyW" || event.code === "ArrowUp") {
        event.preventDefault();
        keys.jumpHeld = true;
        state.player.jumpBuffer = JUMP_BUFFER_TIME;
        jump();
      }
      if (event.code === "KeyR") {
        if (!state.started) {
          startGame();
        }
        const restartIndex = state.gameWon ? 0 : state.levelIndex;
        if (state.gameWon || state.levelIndex === 0) {
          state.totalRunTime = 0;
        }
        state.gameWon = false;
        resetLevel(restartIndex);
      }
    });

    document.addEventListener("keyup", event => {
      if (event.code === "ArrowLeft" || event.code === "KeyA") {
        keys.left = false;
      }
      if (event.code === "ArrowRight" || event.code === "KeyD") {
        keys.right = false;
      }
      if (event.code === "ArrowDown" || event.code === "KeyS") {
        keys.down = false;
      }
      if (event.code === "Space" || event.code === "KeyW" || event.code === "ArrowUp") {
        keys.jumpHeld = false;
      }
    });

    function bindHoldButton(element, onStart, onEnd = onStart) {
      if (!element) {
        return;
      }
      const start = event => {
        event.preventDefault();
        ensureAudio();
        onStart(true);
      };
      const end = event => {
        event.preventDefault();
        onEnd(false);
      };
      element.addEventListener("touchstart", start, { passive: false });
      element.addEventListener("touchend", end, { passive: false });
      element.addEventListener("touchcancel", end, { passive: false });
      element.addEventListener("mousedown", start);
      element.addEventListener("mouseup", end);
      element.addEventListener("mouseleave", end);
    }

    function setupTouchControls() {
      bindHoldButton(ui.touchLeft, pressed => { keys.left = pressed; });
      bindHoldButton(ui.touchRight, pressed => { keys.right = pressed; });
      bindHoldButton(ui.touchDown, pressed => { keys.down = pressed; });
      bindHoldButton(ui.touchJump, pressed => {
        keys.jumpHeld = pressed;
        if (pressed) {
          if (!state.started) {
            startGame();
          }
          state.player.jumpBuffer = JUMP_BUFFER_TIME;
          jump();
        }
      }, pressed => { keys.jumpHeld = pressed; });

      ui.startButton.addEventListener("click", () => {
        if (!state.started) {
          startGame();
        }
      });
    }

    function dismissIntroCard() {
      if (state.started && !state.gameWon) {
        state.introVisible = false;
      }
    }

    canvas.addEventListener("click", dismissIntroCard);
    canvas.addEventListener("touchstart", dismissIntroCard, { passive: true });

    let lastTime = performance.now();
    function loop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.033);
      lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    resetLevel(0);
    setupTouchControls();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
